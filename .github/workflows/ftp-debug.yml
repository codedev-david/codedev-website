name: FTP Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Remove leftover codedev.llc/codedev junk folder (recursive)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -uo pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -u "$FTP_USERNAME,$FTP_PASSWORD" "ftp://$FTP_HOST" -e "set ssl:verify-certificate no; set ftp:ssl-force true; set ftp:ssl-protect-data true; echo '--- codedev.llc/ BEFORE ---'; cls -l codedev.llc/; rm -r -f codedev.llc/codedev; echo '--- codedev.llc/ AFTER ---'; cls -l codedev.llc/; bye"
