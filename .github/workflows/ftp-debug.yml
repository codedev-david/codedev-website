name: FTP Debug

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Remove stray codedev files from shared public_html, then verify
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set -uo pipefail
          U="$FTP_USERNAME"; P="$FTP_PASSWORD"; H="$FTP_HOST"
          del () {
            echo ">>> DELE $1"
            curl -sS --ssl-reqd -k --connect-timeout 30 --user "$U:$P" \
              "ftp://$H/" -Q "DELE $1" >/dev/null 2>&1 && echo "    deleted" || echo "    (not present / skip)"
          }
          # These two are codedev-only files that were accidentally written into the
          # shared public_html root (termpolis.com's docroot) during a path mix-up.
          # termpolis.com does not use them, so removing them is safe.
          del "logo-codedev.svg"
          del "assets/avatar.png"
          echo "===== public_html (termpolis.com docroot) after cleanup ====="
          curl -sS --ssl-reqd -k --user "$U:$P" "ftp://$H/" 2>&1 || true
          echo "===== codedev.llc/ (live codedev docroot) ====="
          curl -sS --ssl-reqd -k --user "$U:$P" "ftp://$H/codedev.llc/" 2>&1 || true
